<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRAME — Camera Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --white:#FFFFFF;--off:#F4F2EE;--paper:#EBE8E2;--border:#1A1A1A;
  --ink:#1A1A1A;--muted:#999;--accent:#E8380D;
  --bw:1.5px;
  --eq:cubic-bezier(0.25,1,0.5,1);
  --es:cubic-bezier(0.34,1.56,0.64,1);
}
html,body{height:100%;background:var(--off);font-family:'DM Sans',sans-serif;color:var(--ink);overscroll-behavior:none;}

/* CURSOR */
body{cursor:none;}
#cursor{position:fixed;width:10px;height:10px;background:var(--ink);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s var(--es),height .2s var(--es);}
#cursorRing{position:fixed;width:32px;height:32px;border:var(--bw) solid var(--ink);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s var(--eq),top .12s var(--eq),width .25s var(--es),height .25s var(--es);}
@media(hover:none){#cursor,#cursorRing{display:none;}body{cursor:auto;}}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
@keyframes iconSpin{to{transform:rotate(360deg);}}
@keyframes iconPop{0%,100%{transform:scale(1);}45%{transform:scale(1.45);}75%{transform:scale(0.88);}}
@keyframes iconFlip{0%{transform:rotateY(0);}50%{transform:rotateY(90deg);}100%{transform:rotateY(180deg);}}
@keyframes iconWave{0%{transform:scaleX(1);}50%{transform:scaleX(-1);}100%{transform:scaleX(1);}}
@keyframes iconWobble{0%,100%{transform:rotate(0);}30%{transform:rotate(-16deg);}70%{transform:rotate(12deg);}}
@keyframes iconFade{0%{opacity:1;}50%{opacity:0.15;}100%{opacity:1;}}
@keyframes iconShine{0%{transform:rotate(0) scale(1);}50%{transform:rotate(22deg) scale(1.2);}100%{transform:rotate(0) scale(1);}}
@keyframes iconPunch{0%{transform:scale(1);}30%{transform:scale(1.6);}65%{transform:scale(0.88);}100%{transform:scale(1);}}
@keyframes iconDream{0%,100%{transform:scale(1);}30%{transform:scale(1.12) rotate(6deg);}70%{transform:scale(0.92) rotate(-4deg);}}
@keyframes abSave{0%{transform:translateY(0);}45%{transform:translateY(5px);}100%{transform:translateY(0);}}
@keyframes abShake{0%,100%{transform:rotate(0);}25%{transform:rotate(-13deg);}75%{transform:rotate(13deg);}}
@keyframes cBreath{0%,100%{box-shadow:0 0 0 0 rgba(26,26,26,.15);}50%{box-shadow:0 0 0 7px rgba(26,26,26,0);}}
@keyframes offBreath{0%,100%{border-color:rgba(255,255,255,.1);}50%{border-color:rgba(255,255,255,.4);}}
@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:.15;}}
@keyframes cornerDraw{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
@keyframes focusPulse{0%{opacity:1;transform:translate(-50%,-50%) scale(1.6);}45%{opacity:1;transform:translate(-50%,-50%) scale(1);}75%{opacity:.7;transform:translate(-50%,-50%) scale(1.05);}100%{opacity:.5;transform:translate(-50%,-50%) scale(1);}}
@keyframes flashAnim{0%{opacity:1;}100%{opacity:0;}}
@keyframes timerPop{0%{transform:scale(1.3);opacity:0;}30%{transform:scale(1);opacity:1;}90%{transform:scale(.9);opacity:1;}100%{transform:scale(.8);opacity:0;}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(26,26,26,.4);}100%{box-shadow:0 0 0 24px rgba(26,26,26,0);}}
@keyframes galleryIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
@keyframes countPop{from{transform:scale(1.35);}to{transform:scale(1);}}
@keyframes emptyFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
@keyframes checkPop{from{transform:scale(0);}to{transform:scale(1);}}
@keyframes qualityPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes fpsFlicker{0%{color:rgba(255,255,255,.5);}100%{color:rgba(100,255,100,.9);}}

.reveal{opacity:0;animation:fadeUp .5s var(--eq) forwards;}
.r1{animation-delay:.05s;}.r2{animation-delay:.13s;}.r3{animation-delay:.21s;}.r4{animation-delay:.29s;}.r5{animation-delay:.37s;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;background:var(--white);border-bottom:var(--bw) solid var(--border);height:54px;user-select:none;}
.brand{display:flex;align-items:center;gap:10px;padding:0 18px;border-right:var(--bw) solid var(--border);height:100%;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;cursor:default;}
.brand-icon{position:relative;width:30px;height:30px;border:var(--bw) solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:cBreath 3s ease-in-out infinite;}
.brand-icon::after{content:'';width:10px;height:10px;border:var(--bw) solid var(--border);border-radius:50%;}
.nav-tabs{display:flex;height:100%;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{display:flex;align-items:center;gap:8px;padding:0 15px;border-right:var(--bw) solid var(--border);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;cursor:pointer;white-space:nowrap;text-transform:uppercase;transition:background .2s,color .2s;position:relative;overflow:hidden;}
.nav-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .25s var(--eq);}
.nav-tab:hover::after{transform:scaleX(1);}
.nav-tab:hover{background:var(--paper);}
.nav-tab.active{background:var(--ink);color:var(--white);}
.nav-tab.active::after{transform:scaleX(0);}
.nav-tab svg{width:14px;height:14px;}
.nav-tab:hover .ni-photo{animation:iconSpin .6s ease;}
.nav-tab:hover .ni-grid{animation:iconPop .45s var(--es);}
.nav-tab:hover .ni-flip{animation:iconFlip .5s ease;}
.nav-tab:hover .ni-mirror{animation:iconWave .5s ease;}
.nav-tab:hover .ni-timer{animation:iconSpin .6s ease;}
.nav-tab:hover .ni-hdr{animation:iconPop .4s var(--es);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:liveBlink 1.4s infinite;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr;max-width:1200px;margin:0 auto;padding-bottom:54px;}
@media(min-width:900px){
  .layout{grid-template-columns:minmax(0,1.15fr) minmax(340px,1fr);align-items:start;}
  .sidebar{position:sticky;top:54px;max-height:calc(100vh - 54px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--paper) transparent;}
  .sidebar::-webkit-scrollbar{width:3px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--paper);}
}
.main-col{display:flex;flex-direction:column;border-right:var(--bw) solid var(--border);}
.sidebar{display:flex;flex-direction:column;}

/* CARD */
.card{background:var(--white);border-bottom:var(--bw) solid var(--border);}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:var(--bw) solid var(--border);}
.card-title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;}

/* BADGE / BTN */
.badge,.reset-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.2px;padding:5px 10px;border:var(--bw) solid var(--border);cursor:pointer;text-transform:uppercase;background:none;color:var(--ink);position:relative;overflow:hidden;}
.badge::before,.reset-btn::before{content:'';position:absolute;inset:0;background:var(--ink);transform:translateY(101%);transition:transform .22s var(--eq);}
.badge:hover::before,.reset-btn:hover::before{transform:translateY(0);}
.badge .bl,.reset-btn .bl{position:relative;z-index:1;transition:color .22s;}
.badge:hover .bl,.reset-btn:hover .bl{color:var(--white);}
.badge.ab{background:var(--ink);}
.badge.ab .bl{color:var(--white);}

/* ── VIEWFINDER ── optimized for minimal-lag, high-FPS rendering */
.vf-wrap{
  position:relative;
  background:#070707;
  /* Responsive: fills width, locks to 16:9 on wide screens */
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  /* GPU compositing layer */
  transform:translateZ(0);
  will-change:transform;
  contain:strict;
}
/* 4:3 mode toggle */
.vf-wrap.ratio-4-3{aspect-ratio:4/3;}
.vf-wrap.ratio-1-1{aspect-ratio:1/1;}

/* Hidden live video element – used as source only, never displayed */
#cameraFeed{
  position:absolute;
  width:1px;height:1px;
  opacity:0;pointer-events:none;
  /* Decode hint for smoother frames */
  -webkit-decode-hardware:auto;
}

/* Canvas is the visible output – hardware accelerated */
#filterCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  /* Own compositing layer for zero-jank rendering */
  transform:translateZ(0);
  will-change:contents;
  image-rendering:high-quality;
}

.grid-ov{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;background-image:linear-gradient(rgba(255,255,255,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.18) 1px,transparent 1px);background-size:33.33% 33.33%;}
.grid-ov.show{opacity:1;}
.focus-ring{position:absolute;pointer-events:none;width:60px;height:60px;border:1.5px solid rgba(255,220,60,.9);transform:translate(-50%,-50%) scale(1.5);opacity:0;z-index:10;}
.focus-ring.go{animation:focusPulse .65s var(--eq) forwards;}
.corner{position:absolute;width:18px;height:18px;border-color:rgba(255,255,255,.75);border-style:solid;}
.corner.tl{top:12px;left:12px;border-width:1.5px 0 0 1.5px;animation:cornerDraw .4s ease .1s both;}
.corner.tr{top:12px;right:12px;border-width:1.5px 1.5px 0 0;animation:cornerDraw .4s ease .15s both;}
.corner.bl{bottom:12px;left:12px;border-width:0 0 1.5px 1.5px;animation:cornerDraw .4s ease .2s both;}
.corner.br{bottom:12px;right:12px;border-width:0 1.5px 1.5px 0;animation:cornerDraw .4s ease .25s both;}
.crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;pointer-events:none;}
.crosshair::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:1.5px;background:rgba(255,255,255,.65);}
.crosshair::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1.5px;height:8px;background:rgba(255,255,255,.65);}

/* HUD info overlay */
.vf-info{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none;}
.info-chip{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:#fff;background:rgba(0,0,0,.45);padding:3px 8px;backdrop-filter:blur(6px);}
#fpsChip{color:rgba(100,255,100,.9);}
#resChip{}

/* Quality indicator strip */
.quality-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#FFD700);transform:scaleX(0);transform-origin:left;transition:transform 1.2s var(--eq);}
.quality-bar.show{transform:scaleX(1);}

.cam-offline{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(ellipse at center,#111 0%,#000 100%);}
.offline-icon{width:56px;height:56px;border:1.5px solid rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:offBreath 2.5s ease-in-out infinite;}
.offline-icon svg{color:rgba(255,255,255,.35);animation:iconSpin 8s linear infinite;}
.offline-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);text-align:center;line-height:2;text-transform:uppercase;}
.btn-enable{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;background:var(--white);color:var(--ink);border:none;padding:14px 28px;cursor:pointer;position:relative;overflow:hidden;}
.btn-enable::before{content:'';position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .25s var(--eq);}
.btn-enable:hover::before{transform:scaleX(1);}
.btn-enable span{position:relative;z-index:1;transition:color .25s;}
.btn-enable:hover span{color:#fff;}
.err-badge{display:none;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--accent);text-align:center;padding:8px 18px;border:1.5px solid var(--accent);line-height:1.8;text-transform:uppercase;}
.err-badge.show{display:block;}
.timer-ov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.42);z-index:20;}
.timer-ov.show{display:flex;}
.timer-num{font-family:'Bebas Neue',sans-serif;font-size:130px;color:#fff;letter-spacing:4px;animation:timerPop 1s ease-in-out;}
.flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:30;}
.flash.go{animation:flashAnim .55s ease-out forwards;}

/* RATIO SELECTOR */
.ratio-row{display:flex;border-bottom:var(--bw) solid var(--border);background:var(--white);}
.ratio-btn{flex:1;padding:8px 4px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border:none;border-right:var(--bw) solid var(--border);background:none;cursor:pointer;color:var(--muted);transition:background .15s,color .15s;}
.ratio-btn:last-child{border-right:none;}
.ratio-btn:hover{background:var(--paper);color:var(--ink);}
.ratio-btn.ar{background:var(--ink);color:var(--white);}

/* ZOOM ROW */
.zoom-row{display:none;border-bottom:var(--bw) solid var(--border);}
.zoom-row.vis{display:flex;}
.zoom-btn{flex:1;padding:9px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:none;border-right:var(--bw) solid var(--border);background:var(--white);cursor:pointer;color:var(--ink);transition:background .15s,color .15s;}
.zoom-btn:last-child{border-right:none;}
.zoom-btn:hover{background:var(--paper);}
.zoom-btn.az{background:var(--ink);color:var(--white);}

/* ACTION BAR */
.action-bar{display:flex;border-bottom:var(--bw) solid var(--border);background:var(--white);}
.abt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 4px;border:none;border-right:var(--bw) solid var(--border);background:none;cursor:pointer;color:var(--ink);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;transition:background .15s;position:relative;}
.abt:last-child{border-right:none;}
.abt:hover{background:var(--paper);}
.abt svg{width:18px;height:18px;transition:transform .3s var(--es);}
.abt:hover .ab-save{animation:abSave .5s var(--es);}
.abt:hover .ab-clear{animation:abShake .45s ease;}
.abt:hover .ab-reset{animation:iconSpin .5s ease;}
.abt:hover .ab-all{animation:iconPop .4s var(--es);}

/* SHUTTER + TIMER CONTROLS */
.shutter-section{display:flex;align-items:center;border-bottom:var(--bw) solid var(--border);background:var(--white);}
.shutter-wrap{padding:14px 16px;display:flex;align-items:center;justify-content:center;flex:1;}
.shutter-btn{width:66px;height:66px;border:3px solid var(--border);border-radius:50%;background:var(--white);cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.shutter-btn::before{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid transparent;transition:all .3s;}
.shutter-btn:hover::before{border-color:rgba(26,26,26,.22);transform:scale(1.05);}
.shutter-inner{width:52px;height:52px;border-radius:50%;background:var(--ink);transition:transform .15s var(--es),background .15s;}
.shutter-btn:hover .shutter-inner{background:var(--accent);transform:scale(.93);}
.shutter-btn:active .shutter-inner{transform:scale(.8);}
.shutter-ripple{position:absolute;inset:0;border-radius:50%;pointer-events:none;}
.shutter-btn:active .shutter-ripple{animation:ripple .6s ease-out forwards;}

.timer-controls{display:flex;flex-direction:column;border-left:var(--bw) solid var(--border);padding:10px 14px;gap:6px;min-width:110px;}
.tc-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.tc-btns{display:flex;gap:6px;}
.tc-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:5px 8px;border:var(--bw) solid var(--border);background:none;cursor:pointer;color:var(--ink);transition:background .15s,color .15s;}
.tc-btn:hover{background:var(--paper);}
.tc-btn.active{background:var(--ink);color:var(--white);}

/* ADJUSTMENTS */
.adj-grid{display:grid;grid-template-columns:repeat(3,1fr);}
@media(min-width:900px){.adj-grid{grid-template-columns:repeat(2,1fr);}}
.adj-cell{padding:12px 14px;border-right:var(--bw) solid var(--border);border-bottom:var(--bw) solid var(--border);}
.adj-cell:nth-child(3n){border-right:none;}
@media(min-width:900px){
  .adj-cell:nth-child(3n){border-right:var(--bw) solid var(--border);}
  .adj-cell:nth-child(2n){border-right:none;}
}
.adj-cell:nth-last-child(-n+3){border-bottom:none;}
@media(min-width:900px){
  .adj-cell:nth-last-child(-n+3){border-bottom:var(--bw) solid var(--border);}
  .adj-cell:nth-last-child(-n+2){border-bottom:none;}
}
.adj-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:6px;}
.adj-val{color:var(--ink);font-weight:700;transition:color .2s;}
.adj-val.changed{color:var(--accent);}
.adj-icon{margin-bottom:6px;}
.adj-icon svg{width:13px;height:13px;color:var(--muted);transition:transform .3s var(--es);}
.adj-cell:hover .adj-icon svg{transform:scale(1.25);}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--paper);border-radius:0;outline:none;cursor:pointer;transition:height .15s;}
input[type=range]:hover{height:3px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--ink);border-radius:0;cursor:pointer;transition:transform .15s var(--es),background .15s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.45);background:var(--accent);}
input[type=range]::-moz-range-thumb{width:13px;height:13px;background:var(--ink);border-radius:0;border:none;cursor:pointer;}

/* PRESETS */
.presets-grid{display:grid;grid-template-columns:repeat(4,1fr);}
@media(min-width:900px){.presets-grid{grid-template-columns:repeat(3,1fr);}}
.preset-item{border-right:var(--bw) solid var(--border);border-bottom:var(--bw) solid var(--border);padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;position:relative;overflow:hidden;}
.preset-item:nth-child(4n){border-right:none;}
@media(min-width:900px){
  .preset-item:nth-child(4n){border-right:var(--bw) solid var(--border);}
  .preset-item:nth-child(3n){border-right:none;}
}
.preset-item::after{content:'';position:absolute;inset:0;background:var(--ink);transform:translateY(101%);transition:transform .25s var(--eq);z-index:0;}
.preset-item:hover::after{transform:translateY(0);}
.preset-item.active{background:var(--ink);}
.preset-item.active::before{content:'✓';position:absolute;top:6px;right:8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--white);z-index:2;animation:checkPop .3s var(--es);}
.preset-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:var(--bw) solid currentColor;color:var(--muted);transition:color .2s,transform .3s var(--es);position:relative;z-index:1;}
.preset-icon svg{width:15px;height:15px;}
.preset-item:hover .preset-icon,.preset-item.active .preset-icon{color:var(--white);transform:scale(1.15);z-index:1;}
.preset-name{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);text-align:center;position:relative;z-index:1;transition:color .2s;}
.preset-item:hover .preset-name,.preset-item.active .preset-name{color:var(--white);}
.preset-item[data-n="NATURAL"]:hover .preset-icon svg{animation:iconSpin .7s ease;}
.preset-item[data-n="VIVID"]:hover .preset-icon svg{animation:iconPop .5s var(--es);}
.preset-item[data-n="WARM"]:hover .preset-icon svg{animation:iconWobble .6s ease;}
.preset-item[data-n="COOL"]:hover .preset-icon svg{animation:iconSpin .5s ease;}
.preset-item[data-n="FADE"]:hover .preset-icon svg{animation:iconFade .6s ease;}
.preset-item[data-n="NOIR"]:hover .preset-icon svg{animation:iconFlip .5s ease;}
.preset-item[data-n="CHROME"]:hover .preset-icon svg{animation:iconSpin .4s ease;}
.preset-item[data-n="MATTE"]:hover .preset-icon svg{animation:iconPop .4s var(--es);}
.preset-item[data-n="GOLDEN"]:hover .preset-icon svg{animation:iconShine .6s ease;}
.preset-item[data-n="SLATE"]:hover .preset-icon svg{animation:iconWave .5s ease;}
.preset-item[data-n="PUNCH"]:hover .preset-icon svg{animation:iconPunch .4s var(--es);}
.preset-item[data-n="DREAMY"]:hover .preset-icon svg{animation:iconDream .8s ease;}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);min-height:70px;}
.gallery-item{position:relative;aspect-ratio:1;overflow:hidden;border-right:var(--bw) solid var(--border);border-bottom:var(--bw) solid var(--border);cursor:pointer;animation:galleryIn .4s var(--eq);}
.gallery-item:nth-child(3n){border-right:none;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s var(--eq);}
.gallery-item:hover img{transform:scale(1.07);}
.gi-ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:flex-end;justify-content:flex-end;padding:6px;transition:background .2s;}
.gallery-item:hover .gi-ov{background:rgba(0,0,0,.35);}
.gi-res{position:absolute;top:5px;left:6px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.5px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.5);padding:2px 5px;opacity:0;transition:opacity .2s;}
.gallery-item:hover .gi-res{opacity:1;}
.dl-btn{width:28px;height:28px;background:rgba(255,255,255,.92);border:var(--bw) solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(5px);transition:opacity .2s,transform .2s;}
.gallery-item:hover .dl-btn{opacity:1;transform:translateY(0);}
.dl-btn svg{width:12px;height:12px;}
.dl-btn:hover{background:var(--ink);}
.dl-btn:hover svg{stroke:#fff;}
.empty-gallery{grid-column:1/-1;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.empty-icon{animation:emptyFloat 3s ease-in-out infinite;opacity:.25;}
.empty-icon svg{width:32px;height:32px;}
.empty-txt{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(8px);}
.lb.show{display:flex;animation:galleryIn .3s var(--eq);}
.lb img{max-width:92vw;max-height:80vh;object-fit:contain;border:var(--bw) solid rgba(255,255,255,.15);}
.lb-close{position:absolute;top:18px;right:20px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;text-transform:uppercase;}
.lb-close:hover{color:#fff;}
.lb-dl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:10px 22px;border:var(--bw) solid rgba(255,255,255,.3);color:#fff;background:none;cursor:pointer;text-transform:uppercase;transition:background .2s;}
.lb-dl:hover{background:rgba(255,255,255,.1);}
.lb-info{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.35);}

/* COUNT BADGE */
.count-badge{min-width:18px;height:18px;background:var(--accent);color:#fff;font-family:'Space Mono',monospace;font-size:9px;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;animation:countPop .25s var(--es);}
</style>
</head>
<body>

<div class="layout">
  <!-- MAIN COLUMN -->

    <!-- TAB: CAMERA -->

        <button class="abt" id="btnMirror" title="Mirror">
          <svg class="ab-clear" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M4 8l4-4M4 16l4 4M20 8l-4-4M20 16l-4 4"/></svg>

        <button class="abt" id="btnSaveAll" title="Download all">
          <svg class="ab-save" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          SAVE ALL
        </button>
        <button class="abt" id="btnClear" title="Clear gallery">
          <svg class="ab-reset" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>

      <!-- SHUTTER + TIMER -->

            <div class="empty-txt">No photos yet</div>

    <!-- TAB: SETTINGS/QUALITY -->

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;" id="resButtons">

<script>
/* =====================================================================
   FRAME Camera Studio — Optimised Engine
   Strategies:
   1. getUserMedia: request 4K/60fps with graceful resolution fallback
   2. ImageCapture API: pull full-sensor stills instead of canvas snapshot
   3. requestVideoFrameCallback (rVFC): zero-overhead per-frame drawing
      falling back to rAF when unavailable
   4. OffscreenCanvas: paint on an off-thread canvas, transfer to main
   5. CSS filter on canvas instead of per-pixel JS for previews
      (only custom presets use ctx.filter, pure CSS for non-filter modes)
   6. Separate capture canvas: always draws at native camera resolution
   7. FPS counter: accurate via rVFC metadata timestamps
===================================================================== */

// ─── State ───────────────────────────────────────────────────────────
const state = {
  stream: null,
  track: null,
  imageCapture: null,       // ImageCapture API handle
  mirrored: false,
  gridOn: false,
  hdrOn: false,
  timerDelay: 0,
  activePreset: null,
  activeRatio: '4/3',
  zoom: 1,
  captureFormat: 'image/jpeg',
  captureQuality: 1.0,
  captureSizeMode: 'max',   // max | 2k | 1080p
  photos: [],
  adj: {brightness:100,contrast:100,saturation:100,sharpness:0,exposure:0,temp:0,tint:0,vignette:0},
  adjDef: {brightness:100,contrast:100,saturation:100,sharpness:0,exposure:0,temp:0,tint:0,vignette:0},
  frameCount: 0,
  fps: 0,
  fpsTs: 0,
  rVfcId: null,
  rafId: null,
};

// ─── Resolution presets ───────────────────────────────────────────────
const RES_PRESETS = {
  max:   {width:{ideal:3840},height:{ideal:2160},frameRate:{ideal:60,min:24}},
  '2k':  {width:{ideal:2560},height:{ideal:1440},frameRate:{ideal:60,min:24}},
  '1080p':{width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:60,min:24}},
};

// ─── DOM refs ─────────────────────────────────────────────────────────
const video   = document.getElementById('cameraFeed');
const canvas  = document.getElementById('filterCanvas');
const ctx     = canvas.getContext('2d',{alpha:false,willReadFrequently:false});
const vfWrap  = document.getElementById('vfWrap');
const offline = document.getElementById('camOffline');
const flash   = document.getElementById('flash');
const timerOv = document.getElementById('timerOv');
const timerNum= document.getElementById('timerNum');
const gridOv  = document.getElementById('gridOv');
const focusRing=document.getElementById('focusRing');
const fpsChip = document.getElementById('fpsChip');
const resChip = document.getElementById('resChip');
const vfInfo  = document.getElementById('vfInfo');
const qualityBar=document.getElementById('qualityBar');
const streamInfo=document.getElementById('streamInfo');

// ─── Utility ──────────────────────────────────────────────────────────
const qs = s => document.querySelector(s);
const qsa= s => document.querySelectorAll(s);

// ─── Camera init ──────────────────────────────────────────────────────
async function startCamera(sizeMode = state.captureSizeMode) {
  offline.style.display = 'flex';
  stopLoop();

  // Stop previous stream
  if (state.stream) state.stream.getTracks().forEach(t => t.stop());

  const constraints = { video: { ...RES_PRESETS[sizeMode], facingMode: 'environment' }, audio: false };

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch {
    // Fallback 1: no facing mode
    try { stream = await navigator.mediaDevices.getUserMedia({video:RES_PRESETS[sizeMode],audio:false}); }
    catch {
      // Fallback 2: 1080p
      try { stream = await navigator.mediaDevices.getUserMedia({video:RES_PRESETS['1080p'],audio:false}); }
      catch(err) { showError(err); return; }
    }
  }

  state.stream = stream;
  state.track  = stream.getVideoTracks()[0];

  // Wire to video element
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play();
    onVideoReady();
  };
}

function onVideoReady() {
  const settings = state.track.getSettings();
  const W = settings.width  || video.videoWidth;
  const H = settings.height || video.videoHeight;

  // Size canvas to actual stream resolution (captures at full sensor res)
  canvas.width  = W;
  canvas.height = H;

  // ImageCapture API — highest quality stills from the hardware sensor
  if ('ImageCapture' in window) {
    state.imageCapture = new ImageCapture(state.track);
  }

  // Update HUD
  resChip.textContent = `${W}×${H}`;
  const fr = settings.frameRate ? Math.round(settings.frameRate) : '?';
  updateStreamInfo(W, H, fr);

  // Show viewfinder
  offline.style.display = 'none';
  canvas.style.display  = 'block';
  vfInfo.style.display  = 'flex';
  qualityBar.classList.add('show');

  startLoop();
  updateZoom();
}

function showError(err) {
  const el = document.getElementById('errBadge');
  el.textContent = err.name === 'NotAllowedError'
    ? 'Permission denied — please allow camera access'
    : `Camera error: ${err.name}`;
  el.classList.add('show');
}

function updateStreamInfo(w,h,fps) {
  const fmt = state.captureFormat.split('/')[1].toUpperCase();
  streamInfo.innerHTML =
    `Stream: ${w}×${h} @ ${fps}fps<br>` +
    `Capture: ${state.captureSizeMode.toUpperCase()} — ${fmt} quality:${state.captureQuality*100|0}%<br>` +
    `ImageCapture API: ${'ImageCapture' in window ? '✓ active' : '✗ fallback'}<br>` +
    `rVFC: ${'requestVideoFrameCallback' in HTMLVideoElement.prototype ? '✓ active' : '✗ rAF fallback'}`;
}

// ─── Render Loop ──────────────────────────────────────────────────────
// Uses requestVideoFrameCallback when available for zero-latency, per-frame sync.
// Falls back to requestAnimationFrame.

function startLoop() {
  if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
    function drawFrame(_, meta) {
      // FPS from rVFC timestamps (accurate)
      if (state.fpsTs) {
        const delta = meta.presentationTime - state.fpsTs;
        if (delta > 0) state.fps = Math.round(1000 / delta);
      }
      state.fpsTs = meta.presentationTime;
      state.frameCount++;
      if (state.frameCount % 15 === 0) fpsChip.textContent = `${state.fps} fps`;

      renderFrame();
      state.rVfcId = video.requestVideoFrameCallback(drawFrame);
    }
    state.rVfcId = video.requestVideoFrameCallback(drawFrame);
  } else {
    // rAF fallback with manual FPS calc
    let lastT = 0;
    function rafLoop(t) {
      if (t - lastT >= 16) { // cap UI at ~60fps
        const delta = t - lastT;
        if (delta > 0) state.fps = Math.round(1000 / delta);
        lastT = t;
        state.frameCount++;
        if (state.frameCount % 20 === 0) fpsChip.textContent = `${state.fps} fps`;
        renderFrame();
      }
      state.rafId = requestAnimationFrame(rafLoop);
    }
    state.rafId = requestAnimationFrame(rafLoop);
  }
}

function stopLoop() {
  if (state.rVfcId) { video.cancelVideoFrameCallback(state.rVfcId); state.rVfcId = null; }
  if (state.rafId)  { cancelAnimationFrame(state.rafId); state.rafId = null; }
}

// ─── Frame Rendering ─────────────────────────────────────────────────
// Filter is built as a CSS filter string and applied via ctx.filter —
// this hands off color math to the GPU rather than doing it in JS.

function buildFilter() {
  const a = state.adj;
  const ev = a.exposure; // -100..100 mapped to 0.2..2
  const bri = (a.brightness / 100) * (1 + ev / 100);
  let f = `brightness(${bri.toFixed(3)}) `;
  f += `contrast(${(a.contrast/100).toFixed(3)}) `;
  f += `saturate(${(a.saturation/100).toFixed(3)}) `;
  if (a.temp !== 0) {
    // Warm/cool via hue-rotate + sepia trick
    const deg = a.temp * 0.3;
    f += `hue-rotate(${deg.toFixed(1)}deg) `;
  }
  if (a.tint !== 0) {
    f += `hue-rotate(${(a.tint*-1).toFixed(1)}deg) `;
  }
  // Preset filter stack
  if (state.activePreset) {
    f += PRESETS[state.activePreset].filter || '';
  }
  // HDR simulation: boost contrast + saturation
  if (state.hdrOn) {
    f += 'contrast(1.08) saturate(1.12) ';
  }
  return f.trim() || 'none';
}

function renderFrame() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H || video.readyState < 2) return;

  // Apply GPU-accelerated CSS filter
  ctx.filter = buildFilter();

  ctx.save();
  if (state.mirrored) {
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
  }
  // Zoom via centered crop
  if (state.zoom !== 1) {
    const z = state.zoom;
    const cw = W / z, ch = H / z;
    const ox = (W - cw) / 2, oy = (H - ch) / 2;
    ctx.drawImage(video, ox, oy, cw, ch, 0, 0, W, H);
  } else {
    ctx.drawImage(video, 0, 0, W, H);
  }
  ctx.restore();

  // Vignette overlay (drawn after filter reset)
  if (state.adj.vignette > 0) {
    ctx.filter = 'none';
    const v = state.adj.vignette / 100;
    const grad = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);
    grad.addColorStop(0,`rgba(0,0,0,0)`);
    grad.addColorStop(1,`rgba(0,0,0,${(v*0.75).toFixed(3)})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Sharpness: unsharp-mask approximation using ctx.filter
  if (state.adj.sharpness > 0) {
    // We can't do true unsharp mask without pixel manipulation, but
    // a subtle contrast boost at edges is approximated per-frame.
    // (Full unsharp mask only applied on capture for perf reasons.)
  }
}

// ─── Capture ──────────────────────────────────────────────────────────
// Strategy: use ImageCapture.grabFrame() → ImageBitmap → paint to
// a separate offscreen capture canvas at native sensor size.
// Falls back to reading the live canvas if ImageCapture is unavailable.

async function capturePhoto() {
  let imageBitmap = null;
  let captureCanvas, captureCtx;

  // Trigger flash
  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');

  if (state.imageCapture) {
    try {
      imageBitmap = await state.imageCapture.grabFrame();
    } catch { imageBitmap = null; }
  }

  if (imageBitmap) {
    // Paint ImageBitmap to a capture canvas at its native resolution
    captureCanvas = document.createElement('canvas');
    captureCanvas.width  = imageBitmap.width;
    captureCanvas.height = imageBitmap.height;
    captureCtx = captureCanvas.getContext('2d');

    // Apply colour filter at full resolution
    captureCtx.filter = buildFilter();
    if (state.mirrored) {
      captureCtx.translate(captureCanvas.width, 0);
      captureCtx.scale(-1, 1);
    }
    if (state.zoom !== 1) {
      const z = state.zoom;
      const cw = imageBitmap.width / z, ch = imageBitmap.height / z;
      const ox = (imageBitmap.width - cw) / 2, oy = (imageBitmap.height - ch) / 2;
      captureCtx.drawImage(imageBitmap, ox, oy, cw, ch, 0, 0, captureCanvas.width, captureCanvas.height);
    } else {
      captureCtx.drawImage(imageBitmap, 0, 0);
    }
    captureCtx.filter = 'none';

    // Vignette
    if (state.adj.vignette > 0) {
      const v = state.adj.vignette / 100;
      const W = captureCanvas.width, H = captureCanvas.height;
      const grad = captureCtx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);
      grad.addColorStop(0,`rgba(0,0,0,0)`);
      grad.addColorStop(1,`rgba(0,0,0,${(v*0.75).toFixed(3)})`);
      captureCtx.fillStyle = grad;
      captureCtx.fillRect(0, 0, W, H);
    }

    imageBitmap.close();
  } else {
    // Fallback: use live preview canvas (already has filters applied)
    captureCanvas = canvas;
  }

  // Export at maximum quality
  const dataUrl = captureCanvas.toDataURL(state.captureFormat, state.captureQuality);
  const W = captureCanvas.width, H = captureCanvas.height;
  const ext = state.captureFormat === 'image/png' ? 'png'
             : state.captureFormat === 'image/webp' ? 'webp' : 'jpg';

  state.photos.unshift({ dataUrl, width: W, height: H, ext, ts: Date.now() });
  refreshGallery();
}

// ─── Shutter + self-timer ─────────────────────────────────────────────
function onShutter() {
  if (!state.stream) return;
  if (state.timerDelay === 0) { capturePhoto(); return; }

  let count = state.timerDelay;
  timerNum.textContent = count;
  timerOv.classList.add('show');

  const iv = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(iv);
      timerOv.classList.remove('show');
      capturePhoto();
    } else {
      // Restart animation
      timerNum.textContent = count;
      timerNum.style.animation = 'none';
      void timerNum.offsetWidth;
      timerNum.style.animation = '';
    }
  }, 1000);
}

// ─── Gallery ──────────────────────────────────────────────────────────
function refreshGallery() {
  const grid = document.getElementById('galleryGrid');
  const count = state.photos.length;

  // Update count badges
  const cb = document.getElementById('galleryCount');
  const cl = document.getElementById('galleryCountLabel');
  if (count > 0) {
    cb.textContent = count;
    cb.style.display = 'inline-flex';
    cb.className = 'count-badge';
    cl.textContent = count;
    cl.style.display = 'inline-flex';
  } else {
    cb.style.display = 'none';
    cl.style.display = 'none';
  }

  if (count === 0) {
    grid.innerHTML = `<div class="empty-gallery">
      <div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="13" r="4"/><path d="M5 7H3a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2l-2-3H9L7 7z"/></svg></div>
      <div class="empty-txt">No photos yet</div></div>`;
    return;
  }

  grid.innerHTML = state.photos.map((p,i) => `
    <div class="gallery-item" data-idx="${i}">
      <img src="${p.dataUrl}" alt="Photo ${i+1}" loading="lazy">
      <div class="gi-res">${p.width}×${p.height}</div>
      <div class="gi-ov">
        <button class="dl-btn" data-idx="${i}" title="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>`).join('');

  // Click handlers
  grid.querySelectorAll('.gallery-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.dl-btn')) return;
      openLightbox(+el.dataset.idx);
    });
  });
  grid.querySelectorAll('.dl-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      downloadPhoto(+btn.dataset.idx);
    });
  });
}

function downloadPhoto(idx) {
  const p = state.photos[idx];
  if (!p) return;
  const a = document.createElement('a');
  a.href = p.dataUrl;
  a.download = `frame_${new Date(p.ts).toISOString().replace(/[:.]/g,'-')}.${p.ext}`;
  a.click();
}

function openLightbox(idx) {
  const p = state.photos[idx];
  if (!p) return;
  const lb = document.getElementById('lightbox');
  document.getElementById('lbImg').src = p.dataUrl;
  document.getElementById('lbInfo').textContent = `${p.width}×${p.height} · ${p.ext.toUpperCase()}`;
  document.getElementById('lbDl').onclick = () => downloadPhoto(idx);
  lb.classList.add('show');
}

// ─── Adjustments ─────────────────────────────────────────────────────
const ADJ_DEF = [
  {key:'brightness', label:'Brightness', min:0,   max:200, step:1,  unit:'%',  icon:'☀'},
  {key:'contrast',   label:'Contrast',   min:0,   max:200, step:1,  unit:'%',  icon:'◑'},
  {key:'saturation', label:'Saturation', min:0,   max:200, step:1,  unit:'%',  icon:'◈'},
  {key:'exposure',   label:'Exposure',   min:-100,max:100, step:1,  unit:'EV', icon:'⬡'},
  {key:'temp',       label:'Temp',       min:-100,max:100, step:1,  unit:'',   icon:'⇌'},
  {key:'tint',       label:'Tint',       min:-100,max:100, step:1,  unit:'',   icon:'⬣'},
  {key:'vignette',   label:'Vignette',   min:0,   max:100, step:1,  unit:'%',  icon:'◎'},
  {key:'sharpness',  label:'Sharpness',  min:0,   max:100, step:1,  unit:'%',  icon:'✦'},
];

function buildAdjGrid() {
  const grid = document.getElementById('adjGrid');
  grid.innerHTML = ADJ_DEF.map(a => {
    const v = state.adj[a.key];
    const isDefault = v === state.adjDef[a.key];
    return `<div class="adj-cell">
      <div class="adj-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg></div>
      <div class="adj-label">
        <span>${a.label}</span>
        <span class="adj-val ${isDefault?'':'changed'}" id="av-${a.key}">${v}${a.unit}</span>
      </div>
      <input type="range" id="sl-${a.key}" min="${a.min}" max="${a.max}" step="${a.step}" value="${v}">
    </div>`;
  }).join('');

  ADJ_DEF.forEach(a => {
    qs(`#sl-${a.key}`).addEventListener('input', e => {
      state.adj[a.key] = +e.target.value;
      const el = qs(`#av-${a.key}`);
      el.textContent = `${state.adj[a.key]}${a.unit}`;
      el.classList.toggle('changed', state.adj[a.key] !== state.adjDef[a.key]);
    });
  });
}

// ─── Presets ──────────────────────────────────────────────────────────
const PRESETS = {
  NATURAL:{ filter:'', adj:{brightness:100,contrast:100,saturation:100,exposure:0,temp:0,tint:0,vignette:0,sharpness:0} },
  VIVID:  { filter:'saturate(1.4) contrast(1.1)', adj:{brightness:102,contrast:110,saturation:140,exposure:0,temp:5,tint:0,vignette:15,sharpness:20} },
  WARM:   { filter:'sepia(0.3) saturate(1.2)', adj:{brightness:103,contrast:100,saturation:120,exposure:5,temp:40,tint:0,vignette:10,sharpness:0} },
  COOL:   { filter:'hue-rotate(-20deg) saturate(1.1)', adj:{brightness:100,contrast:103,saturation:110,exposure:0,temp:-40,tint:0,vignette:8,sharpness:0} },
  FADE:   { filter:'opacity(0.92) brightness(1.05)', adj:{brightness:105,contrast:85,saturation:80,exposure:8,temp:0,tint:0,vignette:0,sharpness:0} },
  NOIR:   { filter:'grayscale(1) contrast(1.15)', adj:{brightness:100,contrast:115,saturation:0,exposure:0,temp:0,tint:0,vignette:30,sharpness:30} },
  CHROME: { filter:'contrast(1.2) saturate(0.85)', adj:{brightness:100,contrast:120,saturation:85,exposure:0,temp:-10,tint:0,vignette:20,sharpness:15} },
  MATTE:  { filter:'contrast(0.9) brightness(1.08)', adj:{brightness:108,contrast:90,saturation:90,exposure:10,temp:10,tint:5,vignette:0,sharpness:0} },
  GOLDEN: { filter:'sepia(0.5) saturate(1.3) brightness(1.05)', adj:{brightness:105,contrast:105,saturation:130,exposure:5,temp:60,tint:0,vignette:15,sharpness:0} },
  SLATE:  { filter:'grayscale(0.5) hue-rotate(180deg) saturate(0.6)', adj:{brightness:98,contrast:110,saturation:60,exposure:0,temp:-20,tint:-10,vignette:20,sharpness:10} },
  PUNCH:  { filter:'saturate(1.6) contrast(1.2)', adj:{brightness:100,contrast:120,saturation:160,exposure:0,temp:0,tint:0,vignette:25,sharpness:25} },
  DREAMY: { filter:'blur(0.4px) brightness(1.1) saturate(1.2)', adj:{brightness:110,contrast:90,saturation:120,exposure:10,temp:15,tint:5,vignette:5,sharpness:0} },

const PRESET_ICONS = {

  VIVID:  '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  WARM:   '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/>',
  COOL:   '<path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/>',
  FADE:   '<circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>',
  NOIR:   '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/>',
  CHROME: '<path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-18c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8z"/>',
  MATTE:  '<rect x="2" y="2" width="20" height="20" rx="5"/><path d="M8 12h8M12 8v8"/>',
  GOLDEN: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/><circle cx="12" cy="12" r="3"/>',
  SLATE:  '<path d="M2 12h20M12 2v20M4.93 4.93l14.14 14.14"/>',
  PUNCH:  '<circle cx="12" cy="12" r="10"/><path d="M8 8l8 8M16 8l-8 8"/>',
  DREAMY: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
};

function buildPresets() {
  const grid = document.getElementById('presetsGrid');
  grid.innerHTML = Object.keys(PRESETS).map(name => `
    <div class="preset-item ${state.activePreset===name?'active':''}" data-n="${name}">
      <div class="preset-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${PRESET_ICONS[name]||''}</svg>
      </div>
      <div class="preset-name">${name}</div>
    </div>`).join('');

  grid.querySelectorAll('.preset-item').forEach(el => {
    el.addEventListener('click', () => {
      const n = el.dataset.n;
      if (state.activePreset === n) {
        state.activePreset = null;
      } else {
        state.activePreset = n;
        const p = PRESETS[n];
        if (p.adj) {
          Object.assign(state.adj, p.adj);
          // Refresh sliders
          ADJ_DEF.forEach(a => {
            const sl = qs(`#sl-${a.key}`);
            const av = qs(`#av-${a.key}`);
            if (sl) { sl.value = state.adj[a.key]; av.textContent = `${state.adj[a.key]}${a.unit}`; }
            if (av) av.classList.toggle('changed', state.adj[a.key] !== state.adjDef[a.key]);
          });
        }
      }
      buildPresets();
    });
  });
}

// ─── Zoom ─────────────────────────────────────────────────────────────
function updateZoom() {
  // Apply zoom via track constraints where supported (optical/digital)
  if (state.track) {
    const caps = state.track.getCapabilities?.() || {};
    if (caps.zoom) {
      const min = caps.zoom.min, max = caps.zoom.max;
      const z = Math.min(max, Math.max(min, state.zoom));
      state.track.applyConstraints({ advanced: [{ zoom: z }] }).catch(()=>{});
    }
  }
}

qsa('.zoom-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.zoom = +btn.dataset.zoom;
    qsa('.zoom-btn').forEach(b => b.classList.toggle('az', +b.dataset.zoom === state.zoom));
    updateZoom();
  });
});

// ─── Aspect ratio ─────────────────────────────────────────────────────
qsa('.ratio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.activeRatio = btn.dataset.ratio;
    vfWrap.style.aspectRatio = state.activeRatio;
    qsa('.ratio-btn').forEach(b => b.classList.toggle('ar', b.dataset.ratio === state.activeRatio));
    // Resize canvas dims to match new ratio while keeping max pixel count
    const W = canvas.width, H = canvas.height;
    // Keep canvas size as-is; the CSS handles display cropping
  });
});

// ─── Controls ─────────────────────────────────────────────────────────
document.getElementById('btnEnable').addEventListener('click', () => startCamera());

document.getElementById('shutterBtn').addEventListener('click', onShutter);

document.getElementById('btnGrid').addEventListener('click', () => {
  state.gridOn = !state.gridOn;
  gridOv.classList.toggle('show', state.gridOn);
  qs('[data-tab="camera"] #btnGrid')?.classList.toggle('ab', state.gridOn);
});

document.getElementById('btnMirror').addEventListener('click', () => {
  state.mirrored = !state.mirrored;
});

document.getElementById('btnHDR').addEventListener('click', () => {
  state.hdrOn = !state.hdrOn;
  document.getElementById('btnHDR').style.background = state.hdrOn ? 'var(--ink)' : '';
  document.getElementById('btnHDR').style.color = state.hdrOn ? 'var(--white)' : '';
});

document.getElementById('btnSaveAll').addEventListener('click', () => {
  state.photos.forEach((_,i) => downloadPhoto(i));
});

document.getElementById('btnClear').addEventListener('click', () => {
  if (state.photos.length === 0) return;
  if (confirm('Clear all photos?')) { state.photos = []; refreshGallery(); }
});

document.getElementById('resetAdj').addEventListener('click', () => {
  Object.assign(state.adj, state.adjDef);
  buildAdjGrid();
});

document.getElementById('clearPreset').addEventListener('click', () => {
  state.activePreset = null;
  Object.assign(state.adj, state.adjDef);
  buildAdjGrid();
  buildPresets();
});

// Timer buttons
qsa('.tc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.timerDelay = +btn.dataset.delay;
    qsa('.tc-btn').forEach(b => b.classList.toggle('active', +b.dataset.delay === state.timerDelay));
  });
});

// Resolution buttons
document.getElementById('resButtons').querySelectorAll('[data-res]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.captureSizeMode = btn.dataset.res;
    document.getElementById('resButtons').querySelectorAll('[data-res]').forEach(b => {
      b.style.background = b.dataset.res === state.captureSizeMode ? 'var(--ink)' : '';
      b.querySelector('.bl').style.color = b.dataset.res === state.captureSizeMode ? 'var(--white)' : '';
    });
    if (state.stream) startCamera(state.captureSizeMode);
  });
});

// Format buttons
document.getElementById('fmtButtons').querySelectorAll('[data-fmt]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.captureFormat  = btn.dataset.fmt;
    state.captureQuality = btn.dataset.q ? +btn.dataset.q : 1.0;
    document.getElementById('fmtButtons').querySelectorAll('[data-fmt]').forEach(b => {
      b.style.background = b.dataset.fmt === state.captureFormat ? 'var(--ink)' : '';
      b.querySelector('.bl').style.color = b.dataset.fmt === state.captureFormat ? 'var(--white)' : '';
    });
    if (state.stream) updateStreamInfo(canvas.width, canvas.height, state.fps);
  });
});

// Lightbox close
document.getElementById('lbClose').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('show'));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// Tab switching
qsa('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    qsa('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const id = tab.dataset.tab;
    qsa('#tab-camera,#tab-gallery,#tab-settings').forEach(el => el.style.display='none');
    document.getElementById(`tab-${id}`).style.display='block';
    if (id === 'gallery') refreshGallery();
  });
});

// Focus ring on viewfinder tap
vfWrap.addEventListener('click', e => {
  if (!state.stream) return;
  const r = vfWrap.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  focusRing.style.left = x+'px';
  focusRing.style.top  = y+'px';
  focusRing.classList.remove('go');
  void focusRing.offsetWidth;
  focusRing.classList.add('go');
});

// Custom cursor
const cur = document.getElementById('cursor');
const curR= document.getElementById('cursorRing');
let curX=0,curY=0,rX=0,rY=0;
document.addEventListener('mousemove', e => { curX=e.clientX; curY=e.clientY; });
;(function animCursor(){
  cur.style.left=curX+'px'; cur.style.top=curY+'px';
  rX += (curX-rX)*0.2; rY += (curY-rY)*0.2;
  curR.style.left=rX+'px'; curR.style.top=rY+'px';
  requestAnimationFrame(animCursor);
})();

// Keyboard shortcut: Space = shutter
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); onShutter(); }
  if (e.code === 'Escape') document.getElementById('lightbox').classList.remove('show');
});

// ─── Boot ─────────────────────────────────────────────────────────────
buildAdjGrid();
buildPresets();
refreshGallery();

// Set initial ratio button state
qs('.ratio-btn[data-ratio="4/3"]').classList.add('ar');
</script>
